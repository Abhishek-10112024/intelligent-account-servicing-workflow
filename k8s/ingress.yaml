apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: iasw-ingress
  namespace: iasw
  annotations:
    # Use cert-manager for automatic HTTPS (requires cert-manager to be installed)
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
    
    # Enable CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    
    # Rate limiting at ingress level (complementary to application-level limiting)
    nginx.ingress.kubernetes.io/limit-rps: "100"
    
    # TLS redirect
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"  # Set to true in production with valid cert
spec:
  # ingressClassName: nginx  # Uncomment if using NGINX ingress controller
  rules:
  - host: iasw.example.com  # Replace with your domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: iasw-backend-service
            port:
              number: 80
  
  # TLS configuration (uncomment when you have a valid certificate)
  # tls:
  # - hosts:
  #   - iasw.example.com
  #   secretName: iasw-tls-cert

---
# Network Policy to restrict traffic (optional for production security)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: iasw-network-policy
  namespace: iasw
spec:
  podSelector:
    matchLabels:
      app: iasw-backend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: iasw-backend
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx  # If using NGINX ingress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    - podSelector:
        matchLabels:
          app: redis
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53  # DNS
    - protocol: UDP
      port: 53  # DNS
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0  # Allow outbound to external APIs (Gemini, etc.)
