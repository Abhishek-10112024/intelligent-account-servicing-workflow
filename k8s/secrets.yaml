apiVersion: v1
kind: Secret
metadata:
  name: iasw-secrets
  namespace: iasw
type: Opaque
stringData:
  # Gemini API Key - REPLACE WITH YOUR KEY
  GEMINI_API_KEY: "YOUR_GEMINI_API_KEY_HERE"
  
  # PostgreSQL credentials
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "postgres"
  
  # For production, use strong credentials and store in proper secret management system
  # (e.g., AWS Secrets Manager, Azure Key Vault, HashiCorp Vault)
