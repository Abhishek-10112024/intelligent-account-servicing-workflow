apiVersion: apps/v1
kind: Deployment
metadata:
  name: iasw-backend
  namespace: iasw
  labels:
    app: iasw-backend
spec:
  replicas: 3  # Scale to 3 instances for HA
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: iasw-backend
  template:
    metadata:
      labels:
        app: iasw-backend
    spec:
      # Wait for database to be ready before starting pod
      initContainers:
      - name: wait-for-db
        image: postgres:15
        command:
        - sh
        - -c
        - until pg_isready -h postgres-service -U postgres; do echo waiting for db; sleep 2; done
      
      containers:
      - name: backend
        # Replace with your container registry and image
        image: iasw/backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        
        # Environment variables from ConfigMap and Secrets
        envFrom:
        - configMapRef:
            name: iasw-config
        - secretRef:
            name: iasw-secrets
        
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        
        # Liveness probe - restart if unhealthy
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        # Readiness probe - only route traffic if healthy
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        # Volume mounts
        volumeMounts:
        - name: uploads
          mountPath: /app/uploads
        - name: logs
          mountPath: /app/logs
      
      # Pod disruption budget for graceful scaling
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - iasw-backend
              topologyKey: kubernetes.io/hostname
      
      volumes:
      - name: uploads
        emptyDir: {}
      - name: logs
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: iasw-backend-service
  namespace: iasw
spec:
  type: ClusterIP
  selector:
    app: iasw-backend
  ports:
  - port: 80
    targetPort: 8000
    name: http
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: iasw-backend-hpa
  namespace: iasw
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: iasw-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 15
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 2
        periodSeconds: 15
      selectPolicy: Max
