apiVersion: v1
kind: ConfigMap
metadata:
  name: iasw-config
  namespace: iasw
data:
  # Application settings
  APP_ENV: "production"
  LOG_LEVEL: "INFO"
  
  # Database connection (will use postgres-service DNS name)
  DATABASE_URL: "postgresql://postgres:postgres@postgres-service:5432/iasw_db"
  
  # Redis connection (will use redis-service DNS name)
  REDIS_URL: "redis://redis-service:6379/0"
  REDIS_ENABLED: "true"
  
  # LLM settings
  GEMINI_MODEL: "gemini-2.0-flash"
  GEMINI_STRICT: "false"
  
  # File storage
  FILENET_UPLOAD_DIR: "uploads"
